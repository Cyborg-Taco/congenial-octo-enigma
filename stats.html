<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📊 Stats</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      color: #fff;
      font-family: system-ui, sans-serif;
      min-height: 100vh;
      padding: 2rem;
    }
    h1 { margin-bottom: 2rem; color: #0f0; }
    .prank-list {
      display: grid;
      gap: 1rem;
      max-width: 600px;
    }
    .prank-card {
      background: #222;
      padding: 1rem;
      border-radius: 8px;
      border-left: 4px solid #0f0;
    }
    .prank-name { font-size: 1.2rem; font-weight: bold; }
    .prank-path { color: #888; font-size: 0.9rem; }
  </style>
</head>
<body>
  <h1>🎯 Available Pranks</h1>
  <div class="prank-list" id="pranks"></div>
  <script type="module">
    const pranks = [
      { name: 'KARLSONVIBE', path: '/pranks/KARLSONVIBE/video.mp4' }
    ];
    
    document.getElementById('pranks').innerHTML = pranks.map(p => `
      <div class="prank-card">
        <div class="prank-name">${p.name}</div>
        <div class="prank-path">${p.path}</div>
      </div>
    `).join('');
  </script>
</body>
</html>
